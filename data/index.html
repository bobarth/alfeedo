<div class='container'>
    <div class="header-row">
        <button class='round-btn' onclick="window.location='/settings'">&#9881;</button>
        <span class="header-title" id="title">Alfeedo</span>
        <button class='round-btn' onclick="window.location='/logs'">&#128366;</button>
    </div>

    <div class="main-layout">
        <!-- Left: feeder image (with vertical fill bar as fallback) -->
        <div class="feeder-image-col">
            <div class="vertical-bar-wrapper">
                <div class="progress-bar-vertical-container">
                    <div id="fillBar" class="progress-bar-vertical-fill" style="height: 0%;"></div>
                    <span class="progress-bar-label" id="fillLabel">0%</span>
                </div>
            </div>
        </div>

        <!-- Right: info column -->
        <div class="info-col">
            <div class="info-row-time" id="serverTime">00:00:00</div>
            <div class="state-value" id="state-label">Idle</div>
            <div class="fill-value" id="fill-pct">0%</div>
            <div class="next-timer-value" id="next-timer-label"></div>
            <div id="error-info-box" style="display: none; margin-top: 4px;">
                <span id="error-label" style="font-size: 0.95em; font-weight: bold;"></span>
            </div>
        </div>
    </div>

    <form id="meal-form" action='/feed?mode=meal' method='POST'>
        <button class='big-btn confirm'>Dispense Meal</button>
    </form>
    <form id="snack-form" action='/feed?mode=snack' method='POST'>
        <button class='big-btn warn'>Dispense Snack</button>
    </form>

    <script>
        const title = document.getElementById('title');
        const timeDisplay = document.getElementById('serverTime');
        const initialTimeStr = timeDisplay.getAttribute('data-server-time');
        const fillLabel = document.getElementById('fillLabel');
        const fillPct = document.getElementById('fill-pct');
        const fillBar = document.getElementById('fillBar');
        const errorBox = document.getElementById('error-info-box');
        const errorLabel = document.getElementById('error-label');
        const stateLabel = document.getElementById('state-label');
        const nextTimerLabel = document.getElementById('next-timer-label');
        const mealForm = document.getElementById('meal-form');
        const snackForm = document.getElementById('snack-form');

        mealForm.addEventListener('submit', function(event) {
            event.preventDefault();
            feed(this.action);
        });
        snackForm.addEventListener('submit', function(event) {
            event.preventDefault();
            feed(this.action);
        });

        function feed(action) {
            fetch(action, {method: 'POST', headers: { 'Content-Type': 'application/x-www-form-urlencoded'}})
                .then(response => {
                    if (response.ok) {
                        console.log("Meal dispensed successfully!");
                        updateDisplay();
                    } else {
                        console.error("Feeder communication error.");
                    }
                })
                .catch(error => {
                    console.error("Network error:", error);
                });
        }

        let currentTime = initialTimeStr ? new Date(initialTimeStr) : new Date();

        function updateDisplay() {
            const h = currentTime.getHours().toString().padStart(2, '0');
            const m = currentTime.getMinutes().toString().padStart(2, '0');
            const s = currentTime.getSeconds().toString().padStart(2, '0');
            timeDisplay.textContent = `${h}:${m}:${s}`;
            currentTime.setSeconds(currentTime.getSeconds() + 1);

            fetch("/api/status")
                .then(response => {
                    if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                    return response.text();
                })
                .then(data => {
                    const stateData = JSON.parse(data.trim());
                    title.textContent = stateData.name || "Alfeedo";
                    currentTime = new Date(stateData.time);

                    const pct = stateData.fillLevel;
                    fillLabel.textContent = pct + '%';
                    fillPct.textContent = pct + '%';
                    fillPct.style.color = pct < 33 ? 'var(--color-status-error)' : 'var(--color-accent)';
                    fillBar.style.height = pct + '%';

                    errorBox.style.display = stateData.errorState === "ok" ? "none" : "block";
                    switch (stateData.errorState) {
                        case "jammed":
                            errorLabel.style.color = 'var(--color-status-error)';
                            errorLabel.innerHTML = "&#9888;&#65038; The feeder may be jammed!";
                            break;
                        case "struggling":
                            errorLabel.style.color = 'var(--color-status-warn2)';
                            errorLabel.innerHTML = "&#9888;&#65038; The feeder is struggling!";
                            break;
                    }

                    switch (stateData.state) {
                        case "idle":    stateLabel.textContent = "Idle"; break;
                        case "moving":  stateLabel.textContent = "Feeding..."; break;
                    }

                    if (stateData.nextTimer.mode !== "off") {
                        const th = String(Math.floor(stateData.nextTimer.time / 60)).padStart(2, "0");
                        const tm = String(stateData.nextTimer.time % 60).padStart(2, "0");
                        nextTimerLabel.textContent = "Next " + stateData.nextTimer.mode + ": " + th + ":" + tm;
                    } else {
                        nextTimerLabel.textContent = "";
                    }
                })
                .catch(error => {
                    console.error('Error fetching status:', error);
                    fillLabel.textContent = 'E';
                });
        }

        updateDisplay();
        setInterval(updateDisplay, 1000);
    </script>
</div>
